name: Build & Deploy

# Die Pipeline ruft nur die lokalen Skripte auf (build.sh/deploy.sh) –
# derselbe Ablauf funktioniert unverändert auf jedem Entwickler-Rechner.
on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: deploy
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: SSH-Zugang zu turing einrichten
              run: |
                  mkdir -p ~/.ssh
                  printf '%s\n' "${TURING_SSH_KEY}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -H firstdorsal.eu >> ~/.ssh/known_hosts
              env:
                  TURING_SSH_KEY: ${{ secrets.TURING_SSH_KEY }}

            - name: Bauen, testen und deployen
              run: bash deploy.sh
